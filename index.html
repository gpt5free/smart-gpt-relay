  <script>
    (function () {
      var mdEl = document.getElementById('markdown');
      var tocEl = document.getElementById('toc');
      var sidebar = document.getElementById('sidebar');
      var menuBtn = document.getElementById('menuBtn');
      var zhBtn = document.getElementById('zhBtn');
      var enBtn = document.getElementById('enBtn');
      var current = 'zh';

      function escapeHtml(str) {
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }

      function slugify(text, index) {
        return 'section-' + index + '-' + encodeURIComponent(text.toLowerCase().replace(/\s+/g, '-')).replace(/%/g, '').slice(0, 40);
      }

      function inline(text) {
        var escaped = escapeHtml(text);
        escaped = escaped.replace(/([^]+)/g, '<code></code>');
        escaped = escaped.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="" target="_blank" rel="noopener noreferrer"></a>');
        escaped = escaped.replace(/&lt;(https?:\/\/[^&\s]+)&gt;/g, '<a href="" target="_blank" rel="noopener noreferrer"></a>');
        return escaped;
      }

      function renderMarkdown(src) {
        var lines = src.replace(/\r\n/g, '\n').split('\n');
        var html = [];
        var headings = [];
        var inUl = false;
        var inOl = false;
        var inCode = false;
        var codeBuf = [];
        var headingCount = 0;

        function closeLists() {
          if (inUl) { html.push('</ul>'); inUl = false; }
          if (inOl) { html.push('</ol>'); inOl = false; }
        }

        lines.forEach(function (line) {
          var trimmed = line.trim();
          if (trimmed.indexOf('`') === 0) {
            if (inCode) {
              html.push('<pre><code>' + escapeHtml(codeBuf.join('\n')) + '</code></pre>');
              inCode = false;
              codeBuf = [];
            } else {
              closeLists();
              inCode = true;
            }
            return;
          }
          if (inCode) { codeBuf.push(line); return; }
          if (!trimmed) { closeLists(); return; }
          if (/^---+$/.test(trimmed)) { closeLists(); html.push('<hr>'); return; }

          var heading = trimmed.match(/^(#{1,6})\s+(.*)$/);
          if (heading) {
            closeLists();
            headingCount += 1;
            var level = heading[1].length;
            var text = heading[2];
            var id = slugify(text, headingCount);
            headings.push({ id: id, text: text, level: level });
            html.push('<h' + level + ' id="' + id + '">' + inline(text) + '</h' + level + '>');
            return;
          }

          if (/^[-*+]\s+/.test(trimmed)) {
            if (inOl) { html.push('</ol>'); inOl = false; }
            if (!inUl) { html.push('<ul>'); inUl = true; }
            html.push('<li>' + inline(trimmed.replace(/^[-*+]\s+/, '')) + '</li>');
            return;
          }

          if (/^\d+\.\s+/.test(trimmed)) {
            if (inUl) { html.push('</ul>'); inUl = false; }
            if (!inOl) { html.push('<ol>'); inOl = true; }
            html.push('<li>' + inline(trimmed.replace(/^\d+\.\s+/, '')) + '</li>');
            return;
          }

          closeLists();
          html.push('<p>' + inline(trimmed) + '</p>');
        });

        if (inCode) html.push('<pre><code>' + escapeHtml(codeBuf.join('\n')) + '</code></pre>');
        closeLists();
        return { html: html.join('\n'), headings: headings };
      }

      function updateToc(headings) {
        var visible = headings.filter(function (h) { return h.level > 1 && h.level < 4; });
        tocEl.innerHTML = visible.map(function (h) {
          return '<a href="#' + h.id + '" style="padding-left:' + (h.level === 3 ? 22 : 10) + 'px">' + escapeHtml(h.text) + '</a>';
        }).join('') || '<a href="#">Overview</a>';
      }

      function load(lang) {
        current = lang;
        zhBtn.classList.toggle('active', lang === 'zh');
        enBtn.classList.toggle('active', lang === 'en');
        document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
        var file = lang === 'zh' ? 'README.md' : 'README.en.md';
        mdEl.innerHTML = 'Loading ' + file + '...';
        fetch(file + '?ts=' + Date.now())
          .then(function (res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.text();
          })
          .then(function (text) {
            var rendered = renderMarkdown(text);
            mdEl.innerHTML = rendered.html;
            updateToc(rendered.headings);
          })
          .catch(function (err) {
            mdEl.innerHTML = '<div class="error">无法读取 ' + file + '：' + escapeHtml(err.message || err) + '</div>';
            tocEl.innerHTML = '';
          });
      }

      zhBtn.addEventListener('click', function () { load('zh'); });
      enBtn.addEventListener('click', function () { load('en'); });
      if (menuBtn) menuBtn.addEventListener('click', function () { sidebar.classList.toggle('open'); });
      load(current);
    })();
  </script>
